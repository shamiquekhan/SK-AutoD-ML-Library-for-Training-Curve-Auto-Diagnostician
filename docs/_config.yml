# SK-AutoD Site Config
title: SK-AutoD
description: "Auto-diagnose your ML training curves in seconds. Detect overfitting, exploding gradients, LR issues, and more."
url: "https://shamiquekhan.github.io"
baseurl: "/sk-autod"

# Theme
remote_theme: just-the-docs/just-the-docs@v0.10.0

# Navigation
nav_sort: order   # use 'nav_order' in each page's front matter

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 2

# Colour scheme — 'dark' or 'light'
color_scheme: dark

# Footer links
footer_content: "MIT License &copy; 2026 Shamique Khan. Built with <a href='https://just-the-docs.com'>Just the Docs</a>."

# GitHub edit link on every page
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/shamiquekhan/SK-AutoD-ML-Library-for-Training-Curve-Auto-Diagnostician"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "edit"

# Aux links (top-right nav buttons)
aux_links:
  "GitHub":
    - "https://github.com/shamiquekhan/SK-AutoD-ML-Library-for-Training-Curve-Auto-Diagnostician"
  "PyPI":
    - "https://pypi.org/project/sk-autod"

aux_links_new_tab: true

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
